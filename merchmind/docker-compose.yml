version: '3.9'

services:
  # ── Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - api-gateway
    networks:
      - merchmind-net

  # ── API Gateway ───────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=merchmind_jwt_secret_change_in_prod
      - AI_ENGINE_URL=http://ai-engine:8000
      - FRONTEND_URL=http://localhost:3000
      - DATABASE_URL=postgresql://merchmind:password@postgres:5432/merchmind
      - MONGODB_URL=mongodb://mongo:27017/merchmind
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - mongo
      - redis
      - ai-engine
    networks:
      - merchmind-net

  # ── AI Engine ─────────────────────────────────────────────────
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://merchmind:password@postgres:5432/merchmind
      - MONGODB_URL=mongodb://mongo:27017/merchmind
      - REDIS_URL=redis://redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - postgres
      - mongo
      - redis
    networks:
      - merchmind-net
    volumes:
      - model-cache:/app/models

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: merchmind
      POSTGRES_USER: merchmind
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - merchmind-net

  # ── MongoDB ───────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./db/mongo/mongo_init.js:/docker-entrypoint-initdb.d/mongo_init.js
    networks:
      - merchmind-net

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    networks:
      - merchmind-net

  # ── Zookeeper (for Kafka) ─────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - merchmind-net

  # ── Kafka ─────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - merchmind-net

volumes:
  postgres-data:
  mongo-data:
  model-cache:

networks:
  merchmind-net:
    driver: bridge
